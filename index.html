<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>img → pdf</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- jsPDF — all PDF processing happens in the browser, nothing is uploaded -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header>
  <div class="logo-group">
    <div class="logo">img<span>→</span>pdf</div>
    <!--
      Intentionally empty — text is injected by setLang() on first load.
      Leaving hardcoded text here would show the wrong language before JS runs.
    -->
    <span class="tagline" data-i18n="tagline"></span>
  </div>

  <div class="header-right">
    <div class="lang-toggle">
      <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
      <button id="lang-pl" onclick="setLang('pl')">PL</button>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────── -->
<main>

  <!-- Left: drop zone + thumbnails -->
  <section id="drop-zone">
    <div class="drop-target" id="drop-target">
      <input type="file" id="file-input" accept="image/*" multiple aria-label="Select images" />
      <!-- Upload / add images icon -->
      <span class="drop-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
          <rect x="2" y="2" width="20" height="20" rx="3"/>
          <circle cx="8" cy="8.5" r="1.75"/>
          <polyline points="2 16.5 7.5 11 11.5 15"/>
          <polyline points="13 13 16.5 9.5 22 16.5"/>
          <line x1="15" y1="5.5" x2="21" y2="5.5"/>
          <line x1="18" y1="2.5" x2="18" y2="8.5"/>
        </svg>
      </span>
      <p>
        <strong data-i18n="dropTitle"></strong><br />
        <span data-i18n="dropSub"></span><br />
        <span class="formats">JPG · PNG · WebP · GIF · BMP · AVIF</span>
      </p>
    </div>

    <div id="preview-grid"></div>

    <div id="empty-state">
      <!-- Empty state: stacked files icon -->
      <span class="big" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" width="52" height="52">
          <rect x="4" y="5" width="13" height="16" rx="2"/>
          <path d="M7 3h10a2 2 0 0 1 2 2v14"/>
          <line x1="7"  y1="10" x2="13" y2="10"/>
          <line x1="7"  y1="13" x2="13" y2="13"/>
          <line x1="7"  y1="16" x2="10" y2="16"/>
        </svg>
      </span>
      <span data-i18n="emptyHint"></span>
    </div>
  </section>

  <!-- Right: settings sidebar -->
  <aside id="sidebar">

    <div class="sidebar-section">
      <h3 data-i18n="sectionPage"></h3>

      <label>
        <span data-i18n="labelPageSize"></span>
        <select id="page-size">
          <option value="a4">A4  (210 × 297 mm)</option>
          <option value="letter">Letter  (8.5 × 11 in)</option>
          <option value="a3">A3  (297 × 420 mm)</option>
          <option value="a5">A5  (148 × 210 mm)</option>
          <option value="fit" data-i18n="optFit"></option>
        </select>
      </label>

      <label>
        <span data-i18n="labelOrientation"></span>
        <select id="orientation">
          <option value="auto"      data-i18n="optAuto"></option>
          <option value="portrait"  data-i18n="optPortrait"></option>
          <option value="landscape" data-i18n="optLandscape"></option>
        </select>
      </label>

      <div class="row">
        <label>
          <span data-i18n="labelMargin"></span>
          <input type="text" id="margin" value="0" inputmode="decimal" />
        </label>
        <label>
          <span data-i18n="labelQuality"></span>
          <select id="quality">
            <option value="0.95" data-i18n="qualHigh"></option>
            <option value="0.80" data-i18n="qualMed" selected></option>
            <option value="0.60" data-i18n="qualLow"></option>
          </select>
        </label>
      </div>
    </div>

    <div class="sidebar-section">
      <h3 data-i18n="sectionOutput"></h3>

      <label>
        <span data-i18n="labelFilename"></span>
        <input type="text" id="filename" value="output" />
      </label>

      <div class="toggle-row">
        <span data-i18n="labelOnePerPage"></span>
        <label class="switch">
          <input type="checkbox" id="one-per-page" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="sidebar-section">
      <h3 data-i18n="sectionQueue"></h3>
      <div class="stat-row">
        <span data-i18n="statImages"></span>
        <span id="stat-count">0</span>
      </div>
      <div class="stat-row">
        <span data-i18n="statSize"></span>
        <span id="stat-size">—</span>
      </div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <span id="progress-label"></span>
    </div>

    <button class="btn btn-primary" id="btn-convert" disabled data-i18n="btnGenerate"></button>
    <button class="btn btn-ghost"   id="btn-clear"   data-i18n="btnClear"></button>

  </aside>
</main>

<!-- ── Footer ──────────────────────────────────────────────────── -->
<footer>
  <span data-i18n="footerPowered"></span>
  <a href="https://github.com/parallax/jsPDF" target="_blank" rel="noopener">jsPDF</a>
  <span class="footer-dot">·</span>
  <a href="https://github.com/philornot/images-to-pdf" target="_blank" rel="noopener">
    github.com/philornot/images-to-pdf
  </a>
</footer>

<!-- Mobile sticky generate bar (hidden on desktop) -->
<div id="mobile-bar">
  <button class="btn btn-primary" id="btn-convert-mobile" disabled data-i18n="btnGenerate"></button>
</div>

</body>
</html>
